body:
  text: 大金發祥於愛新水愛新者國語金也故建國即以金為號乃因金色白遂欲從而尚之妄矣且五德之運說本無稽縱如所言亦取其或生或剋議者以宋為火德遼為水德大金當為金德夫宋雖南遷正統自宜歸之宋至元而宋始亡遼金固未可當正統也若夫商尚白周尚赤其見於經者亦祗白馬騂剛之類各從其色至如上衣下裳元纁相稱則三代同之而德運之論固未之前聞也自漢儒始言五德迭王遂推三皇五帝各有所尚後更流為䜟緯抑又惑之甚矣夫一代之興皆由積德纍仁豈遂五行之生剋而服御所尚自當以黃為正餘非所宜元明制度尚黃不侈陳五德之王其義甚正本朝因之足破漢魏以後之陋說因題是編並闡而正之德運相承雖有之繼天立極豈因斯六經未見明文紀兩漢方傳家語辭不出五行生剋術那關萬姓順違為即云正統當歸正亦曰基仁乃永基八帝瑞符縱殊别一時色尚已參差說者謂五德之王各以相生為序而所尚之色即從其所王之德如伏羲木德神農火德黃帝土德少皥金德顓頊水德帝嚳木德帝堯火德虞舜土德皆以次遞嬗而色之所尚惟黃帝尚黃與德相合若羲農少皥皆不言色顓頊尚赤帝堯尚白用其所勝之色帝嚳尚黑用所由生虞舜尚赤用其所生則又理之所不可通者也宅中圖大土應守表衆居尊黃實宜土為中央正位黃宜為中央正色王者居中立極自當以黃為貴豈他色之所得尚哉朝夕惕乾惟益勵休祥䜟緯底須奇勝朝未議國朝述足破千秋萬古疑欽定四庫全書史部十三提要政書類二儀制之屬大金德運圖說一卷臣等謹案大金德運圖說一卷金尚書省會官集議德運所存案牘之文也案金史本紀金初色尚白章宗泰和二年十一月更定德運為土臘月辰詔告中外至宣宗貞祐二年正月命有司復議本朝德運是書所載蓋即其事書前為尚書省判次為省劄列集議官二十二人其中獨上議狀者六人合具議狀者八人連署者四人其集議有名而無議狀者太子太傅張行簡太子太保富察烏葉修撰富珠哩阿拉費摩諳逹登四人疑原書尚有所脫佚其所議言應為土德者四人言應為金德者十四人如諫議大夫張行信力主金德之議而金史行信本傳稱貞祐四年以參議官王澮言當為火德詔問有司行信謂當定為土德而斥澮所言為狂妄其立說先後自相矛盾殊不可解又書中但有諸臣議狀而尚書省臣無所可否考史載興定元年十二月庚辰臘享太廟是終金之世仍從泰和所定土德而未嘗重改疑是時當元兵深入宣宗南遷汴梁此議遂罷故尚書省亦未經奏覆也五德之運不見六經惟家語始有之而其書出於王肅僞撰不可據為典要後代泥於其說多侈陳五行傳序之由而牽合遷就附會支離亦終無一當仰䝉我皇上折𠂻垂訓斥妄祛疑本宅中圗大之隆規破䜟緯休祥之謬論闡發明切立千古不易之定論是編所議識見皆為偏陋本不足録然此事史文簡略不能具其始末存此一帙尚可以補掌故之遺並恭録聖製辨諸簡首俾天下後世曉然知騶衍以下皆妄生臆解用以祛曲說之惑焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部十三提要政書類二儀制之屬大金德運圖說一卷臣等謹案大金德運圖說一卷金尚書省會官集議德運所存案牘之文也案金史本紀金初色尚白章宗泰和二年十一月更定德運為土臘月辰詔告中外至宣宗貞祐二年正月命有司復議本朝德運是書所載蓋即其事書前為尚書省判次為省劄列集議官二十二人其中獨上議狀者六人合具議狀者八人連署者四人其集議有名而無議狀者太子太傅張行簡太子太保富察烏葉修撰富珠哩阿拉費摩諳逹登四人疑原書尚有所脫佚其所議言應為土德者四人言應為金德者十四人如諫議大夫張行信力主金德之議而金史行信本傳稱貞祐四年以參議官王澮言當為火德詔問有司行信謂當定為土德而斥澮所言為狂妄其立說先後自相矛盾殊不可解又書中但有諸臣議狀而尚書省臣無所可否考史載興定元年十二月庚辰臘享太廟是終金之世仍從泰和所定土德而未嘗重改疑是時當元兵深入宣宗南遷汴梁此議遂罷故尚書省亦未經奏覆也五德之運不見六經惟家語始有之而其書出於王肅僞撰不可據為典要後代泥於其說多侈陳五行傳序之由而牽合遷就附會支離亦終無一當仰䝉我皇上折𠂻垂訓斥妄祛疑本宅中圗大之隆規破䜟緯休祥之謬論闡發明切立千古不易之定論是編所議識見皆為偏陋本不足録然此事史文簡略不能具其始末存此一帙尚可以補掌故之遺並恭録聖製辨諸簡首俾天下後世曉然知騶衍以下皆妄生臆解用以祛曲說之惑焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書大金德運圖說省判貞祐二年正月二十二日丞相面奉聖㫖本朝德運公事教商量呈檢本部照得德運之說五經不載惟家語有云古之王者易代改號取法五行終始相生自漢以來並用其說故以庖犧氏為木德神農為火德黃帝為土德少昊為金德顓頊為水德厯代相承各以一德興運周而復始自明昌四年十二月十一日奉章宗敕㫖本朝德運仰商量當時本部為事關頭段呈乞都省集省臺寺監七品以上官同共講議蒙都省准呈集官講議在後纍年講究勘當未定至承安四年十二月蒙都堂再選定朝官十餘員置所講究定奪至承安五年二月二十日章宗皇帝再有敕㫖商量德運事屬頭段莫不索選本朝漢兒進士知典故官員集議後得長處當時蒙都省再選到官四十餘員置所集議其官員議論既多不能歸一至泰和元年都省將衆人前後議論編類成六册轉進過其間衆人議論不同其岐有四刑部尚書李愈以為本朝太祖以金為國號又自國初至今八十餘年以丑為臘若止以金為德運則合天心合人道合祖訓翰林學士承㫖党懷英取蘇軾書傳之說以為禹以治水得天下故從水而尚黑書云禹錫𤣥圭是也殷人始以兵王故從金而尚白詩曰有客有客亦白其馬是也欽惟太祖皇帝興舉義兵剪遼平宋奄有中土與殷以兵王而尚白理同本朝宜為金德此蓋遵太祖之聖訓有自然之符應謂宜依舊為金德而不問五行相生之次也户部尚書孫鐸侍讀學士張行簡太常卿楊庭筠等以為唐為土德五代朱梁自前世已不比數後唐本非李氏子孫又强自附於唐之土德外石晉十二年劉漢四年郭周九年皆乘時攘竊其祚促短何足以當德運宋不用趙垂慶之言不肯繼唐統乃繼郭周為火德是彼自失其序合為閏位聖朝太祖聖訓完顔部色尚白白即金之正色自今本國可號大金又嘗有純白鳥獸瑞應皆載之國史請依舊為金德上承唐統此蓋亦依太祖聖訓自然符應而取越惡承善越近承逺之說也祕書郎吕貞幹校書郎趙泌以為聖朝先遼國以成帝業遼以水為德水生木國家宜承遼運為木德此蓋别是一說也惟太常丞孫人傑造為傾險之論以為宋運已絶禮官所以言不及宋而委曲擬承唐者意以為宋猶未絶豈彼之心不欲以絶宋乎人傑作此險語本意欲朝廷繼宋運而為土德而忮心求勝故也大理卿完顔薩喇直學士溫特赫大興應奉完顔恩楚𢎞文校理珠嘉珠敦等皆以為合繼宋運而為土德至泰和二年奉章宗勑㫖繼唐底事必定難行繼宋底事莫不行底麼吕貞幹所言繼遼底事雖未盡理亦可折正不然只從李愈所論本朝得天下太祖以國號為金只為金德復如何當年十月二十五日尚書省奏遼據一偏宋有中原是正統在宋其遼無可繼張邦昌劉豫皆本朝取宋以後命立之使守河南山東陜西之地即本朝之臣耳吕貞幹何得言楚齊更霸不可强繼宋孽李愈所論太祖聖訓即是分别白黑之姓非關五行之叙皇朝滅宋俘其二主火行已絶我乘其後趙構假息江表與晉司馬睿何異若准完顔薩喇孫人傑等所議本朝合繼火德已絶汴梁之宋以為土德是為相應奉勑㫖准奏行於是告於宗廟改用辰日為臘及頒詔書布諭天下奉行至今今來契勘若便輕易議論緣事關頭段自章宗朝選集衆官専委講究前後十年才始奏定告廟頒詔其重如此既見欽奉聖㫖教商量緣係國家德運當慎其事擬乞從都省依前例選集羣官再行詳議採用所長庶得其當省劄貞祐二年二月初三日承省劄禮部呈該承省劄奉聖㫖本朝德運公事教商量事緣為事關頭段擬乞選官再行詳議尚書省相度合准來呈今㸃定下項官須議指揮太子太傅張行簡太子太保富察烏葉解任吏部尚書完顔伯特越王傅完顔伊爾必斯諫議大夫張行信翰林待制完顔烏楚直學士趙秉文大理卿李居柔刑部郎中富察伊爾必斯吏部員外郎納塔謀嘉户部郎中赫舍哩烏嚕左司諫吕卿雲濮王府尉阿里哈希卜蘇右拾遺田庭芳刑部員外郎吕子羽修撰富珠哩阿拉修撰舒穆嚕世績修撰費摩諳逹登應奉崔禧應奉黃裳應奉穆顔烏登編修王仲元右仰就便行移逐官不妨本職及已委勾當同共講究施行不得違錯准此議自前來議論有四說不論所繼只為金德刑部尚書李愈之說也繼唐土運為金德户部尚書孫鐸太常卿楊庭筠等之說也繼遼水運為木德祕書郎吕貞幹之說也繼宋火運為土德太常丞孫人傑之說也大理卿完顔薩喇直學士溫特赫大興校理珠嘉珠敦等皆以為合繼宋運為土德後奉章宗敕㫖繼唐底事必定難行繼宋底事莫不行底麼吕貞幹所言繼遼底事雖未盡理亦可折正不然只從李愈所論本朝得天下太祖以國號為金只為金德復如何尚書省奏遼據一偏宋有中原是正統在宋其遼無可繼張邦昌劉豫皆本朝取宋以後命立之使守河南山東陜西之地即本朝之臣耳吕貞幹何得言齊楚更霸不可强繼宋孽李愈所論太祖聖訓即是分别白黑之姓非關五行之叙皇朝滅宋俘其二主火行已絶我承其後趙構假息江表與晉司馬睿何異若准完顔薩喇孫人傑等所議本朝合繼火德已絶汴梁之宋以為土德是為相應奉敕㫖准奏行今來見奉聖㫖本朝德運公事教商量奉到如此今則見有一議論以謂汴宋既亡劉豫嗣掌齊國本朝滅齊然後混一中原宋為火火生土劉齊當以土運土生金本朝合為金德應奉翰林文字黃裳議右裳伏承省劄仰講議本朝德運者傳曰君子大居正又曰王者大一統正者所以正天下之不正統者所以統天下之不一也由不正與不一然後正統之論興正統之論興然後德運之議定自近代言之則唐以土德王𫝊祀三百土生金繼唐而王者德當在金朱溫唐之羿浞固無足道朱邪存勗以賜姓號唐滅梁之後僅得四年復為異姓嗣源所奪是可以當德運邪厥後石晉興亡實係契丹劉漢父子通及四載郭威以逆而得柴榮自外而繼是皆不足以當德運明矣惟汴梁趙宋傳祚數君差優於五季然考其實則趙宋以柴氏之臣欺孤兒寡婦以取其國初不能併契丹復唐故地而其後嗣君與契丹通好其實事之夫欺奪柴氏是不能正天下之不正也實事契丹是不能統天下之不一也其臣如趙垂慶張君房董衍輩諛說其君欲使承唐為金德者非一使當時牽合而從之猶不足以塞後世之公議况妄為火德也哉我尚可以繼之也哉我太祖之興也當收國改元之初謂凡物之不變無如金者且完顔部色尚白則金之正色自今本國可號大金神哉斯言殆天啓之也繼以太宗遂平遼宋夫遼宋不能相正而我正之不能相一而我統之正統固在我矣光承唐運非我而誰事固有不求合而自合者設無太祖聖訓本朝德運固應金行况乎言與天合而復有純白鳥獸自然之瑞哉故自丑日為臘以來時和嵗豐中外禔福干戈偃息者八十餘年嗚呼休哉金得其正也泰和之初議者以汴宋嘗帝中原為可繼於是改金為土曽不知遼亦嘗滅晉而得中原矣本朝實先取遼何獨不繼哉既閏遼矣而宋獨不可閏乎哉改之誠是矣其天時人事之應果愈於前日邪抑不及邪夫秦能并六國一四海作法立制後世有不可改者直以不道漢尚越之而繼周以區區篡奪之宋且嘗事遼我獨不能越之而承唐乎誠能復金德之舊則上以副祖宗之意下有以慰遺老之思袪除不祥感召善氣在此舉矣臆見如此伏俟裁擇謹議貞祐二年二月日應奉翰林文字黃裳狀翰林待制兼侍御史完顔烏楚議右烏楚欽依見奉聖㫖商議本朝德運事烏楚先於章宗朝已與完顔薩喇溫特赫大興孫人傑郭仲容孫人鑑等以為本朝繼宋宋為火德火德已絶火生土我為土德是為相應奉勑㫖准奏行今據烏楚所見本朝德運止合依先朝奉行為土德似為長便貞祐二年二月日翰林待制兼侍御史完顔烏楚狀承直郎國史院編修官王仲元議右仲元承尚書禮部符承省劄備該今來見奉聖㫖本朝德運公事教商量仲元品職雖卑亦令預商量之數謹按歐陽修正統論有曰君子大居正王者大一統正者所以正天下之不正也統者所以合天下之不一也自古帝王之興必有至德以受天命豈偏名於一德哉而曰五行之運有休王一以彼衰一以此勝此厯官術家之事不知出於何人伏覩本朝之興混一區宇正歐陽修所謂大居正大一統者也收國之初太祖皇帝以金為國號取其不變之義非取五行之數也必欲順五行相生之德則前此章宗皇帝宸斷繼亡宋火行之絶而為土德雖當日改辰為臘然大金之號亦自仍舊以冠厯日而不相妨也以此看詳止為土德是為相應須至申者貞祐二年二月日承直郎國史院編修官王仲元狀十六日應奉崔伯祥連署訖翰林直學士中大夫兼太常少卿提㸃司天臺趙秉文議右秉文議除與編修王仲元相同外竊詳聖朝之興併滅遼宋俘宋二主遷其寶器宋為已滅章宗皇帝宸斷以土繼火已得中當宜不可越宋而逺繼唐以此看詳止為土德是為相應須至中者貞祐二年二月日翰林直學士中大夫趙秉文狀翰林修撰舒穆嚕世績刑部員外郎吕子羽議右世績等伏承禮部符文令議德運事竊見前來朝廷論議固已詳備但各執所見或以為金或以為木或以為土彼此不同世績等愚見既太祖聖訓謂完顔部色尚白則是太祖宸斷已有所定也當時瑞應復有純白鳥獸之異則是天意固有所命也章宗勑㫖謂只從李愈所論以為金德復如何則是章宗聖意初亦有所疑也據此合無止為金德仍舊以丑為臘謹議貞祐二年二月日翰林修撰舒穆嚕世績刑部員外郎吕子羽狀十六日大理卿李和甫連署訖十八日户部郎中赫舍哩烏嚕連署訖右諫議大夫吏部侍郎張行信議右行信准禮部告示集議國家德運事竊以德運之說其來久矣自伏羲以木德王炎帝為火軒皇為土五帝三王相承以叙皆取五行生旺之氣也蒼周訖籙木宜生火秦雖强大傳五世併六國自為水行逆統失次及漢祖開創斷蛇著符旗幟尚赤此自然之應協於火德故漢初惑臣誼異說雖暫為土其後終為火德承周之統魏晉以降劉石燕秦迭據中國以世業促褊不獲推叙元魏興自𤣥朔物色尚黑此亦自然之應協於水德故魏初雖繼秦為土理有未愜及孝文纘業覽朝賢之議卒定為水德逺承晉運周隋暨唐更無異論以其序順而理得也降及五代篡亂相尋地𥚹世促更甚於苻秦燕趙其不足推叙亦明矣且梁與晉周皆以篡取豈獨梁為閏位後唐三姓俱非李氏子孫豈得仍為土運石晉一紀劉漢四年本史各不載其所王之德謂之金與水者無所考據蓋趙氏篡周不能越近承逺既繼周木猥稱火德必欲上接唐運以自誇大故逆推而强配之以漢為水以晉為金而續後唐之土是皆妄說附㑹不可信也然則唐土之後當啓金運朱梁以下無可言者宋昧於所承自稱火德逆統失次亦與秦水無異此國朝所以繼宋為土有可疑者也五行之運豈有斷絶考次推時天意可見自唐之僖昭墜緒於西本朝始祖已肇迹於東氣王於長白祚衍於金源奕世載德遂集大統太祖開國之始謂部色尚白白者金之正色乃以大金為號天輔年間又多有純白之瑞凡此數者皆暗相符應運之為金亦昭昭矣或謂部色尚白國號為金太祖本不言及五行之叙難便據之為運是不知漢獲赤帝符尚赤元魏居𤣥朔尚黑當初亦非論德運也何妨漢之為火魏之為土晉之為水哉蓋帝王乘五德之運王有天下於開創之初必有自然符應協於五德不得不據而言之也今蒙集議德運所宜行信愚見若考國初自然之符應依漢承周魏承晉之故事定為金德上承唐運則得天統合祖意古典不違人心亦順矣若夫汴宋之火前無所承失其行次自為五行之閏位不足繼也謹議貞祐二年二月日右諫議大夫兼吏部侍郎張行信狀二十日左司諫吕祥卿連署訖朝請大夫應奉兼編修穆顔烏登等議右烏登等竊見自古推定德運者多矣有承其序而稱之者有協其符而取之者故二帝三王以五行相因備載於漢史此承其德運之叙而稱之者也迄於漢世不取賈誼公孫臣之議卒以旗幟尚赤此協其斷蛇之符而取之者也由是觀之承德運之序協天之符瑞乃明哲所行之令典也欽惟太祖一戎衣而天下大定遂乃國號大金以丑為臘是時雖未嘗究其德運而聖謀自得其正其與天之符瑞粲然相合矣何以言之且自李唐王以土德其後朱梁不能混一天下不得附於正統誠為然矣而後唐本姓朱邪非李唐之苖裔而强附於土德究其失則後唐當為金石晉為水劉漢為木後周為火亡宋為土既土生金而聖朝以丑為臘者誠可謂默獲德運之正矣况自國初嘗獲純白鳥獸之瑞兼長白山素係國家福幸之地且白者既為金色而太祖國號為金其與天之符瑞灼然協矣美哉得德運之正協天之符瑞以致四夷咸懷六合同風干戈永息禮樂興隆八十餘年寂然無事逮乎章宗之朝議論德運而孫人傑等備言當繼於宋可謂得其事之實者也然而不究亡宋失序為火德之由乃謂之土生於火以辰為臘今若正其宋失更火為土則本朝取宋自為金德若是則得其德運之正而協於天之符瑞矣貞祐二年二月十六日朝請大夫應奉兼編修穆顔烏登少中大夫吏部員外郎納塔謀嘉中大夫濮王府尉阿里哈希卜蘇中議大夫刑部郎中富察伊爾必斯通奉大夫越王傳完顔伊爾必斯中奉大夫吏部尚書完顔伯特同議右拾遺田庭芳議右庭芳伏為承本部告示集議德運事者竊惟從來德運之稱不一大率有三或以本土物色之竒為之應或以當時符瑞之殊為之合或以曩朝王跡之始為之繼其間有一於此即可為其運號不必以五行相生為序論夫本朝於是有所得之者多何以知之蓋聞本朝肇跡之方多出金寶且金之正色也尚白本地又有長白山其中是物自生而白此為金德是其物色之竒應之者一也兼天輔之初有純白鳥獸屢嘗來見此為金德是其符瑞之殊合之者二也又聞曽論本朝合繼唐之土德謂唐為有道之統自梁以下皆起於亂無可接之於是者至於宋也雖如䥫中之錚粗如可取及見趙垂慶等言猶不從之反繼柴周以為火德是其自失唐之正統之序意者以謂當其𤣥運有以待其來兆金之應也兹者若繼於唐亦猶漢之越秦繼周之例此為金德是其與王跡之始繼之者三也又聞故老相傳國初將舉義師也曽遣人詣宋相約伐遼仍請𠫭定其國之本號時則宋人自以其為火德意謂火當克金遂因循推其國號為金自想為得不知伊本統非為火果是因其自背還自速其俘降識者又謂金得火則乃能成器由宋假於其火轉成金國之大也宜然是故向來以丑為臘者八十餘年應是當時已有定論後疑失其文本不得其詳爾今來議者本欲復其金之號徒自膠其反本之說其間有所疑議者二請試釋之一則强為遷就謂劉齊繼宋宋火也火當生土本朝廢齊齊土也土當生金是不知宋已失序固非為火之正齊又出於臣使之封抑非為土之正如此序本朝為金德之運似非折中一則議者復謂宋或為火以金忌於火為避不知宋非為火已如上說設如宋本為火曽不知五行造化衰火不能克於旺金且如昔之秦為水運水當克火漢為火運火德忌水然則秦終為漢滅之者得非以秦德衰而漢德旺之故耶以此參詳如以本朝為金德之運委是相應至如以五行上推移之則亦是以德之衰旺見其運之隆替可使慎終如始為其戒爾良以金之為言名則取其堅固不變為體本以貴其剛明有斷為德則知金主於義義以合宜者行一切與奪間决然無疑者是追觀太祖已行之迹固有其義若然是謂開其金運之先貽則於後使燕翼者也今則如能必復金德之運必依祖義則事自然無所不斷位自然無所不固如不依祖義徒慿運號則亦猶宋人向曽以河清為天水郡之瑞應以萬嵗山真武廟為鎮北方之術殊不稽於人事畢竟何如右謹議伏承尚書禮部詳酌是望省奏尚書省奏准尚書禮部舉竊聞王者受命開統皆應乎五行之氣更王為德方今併有遼宋統一區夏猶未定其所王伏覩今來方以營造都邑并宗廟社稷竊恐隨代制度不一有無委所司一就詳定奏訖奉聖㫖分付詳定須議指揮右下詳定內外制度儀式所可照撿依准所奉聖㫖詳定訖分朗開立狀申以憑再具聞奏施行不得住滯錯失付詳定所准此
